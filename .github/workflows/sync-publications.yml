name: OpenAlex sync

# Runs scripts/sync_publications.py weekly. If new candidate papers are
# found, opens (or updates) a PR titled "OpenAlex sync …" containing
# pending_publications.yaml + the updated scripts/sync-state.yaml. The
# maintainer reviews the PR — copying wanted entries into
# src/content/publications/content.yaml on the same branch — then merges.
#
# Manual trigger: Actions tab → "OpenAlex sync" → Run workflow.

on:
  schedule:
    # Mondays 12:00 UTC (~07:00 ET / ~04:00 PT)
    - cron: '0 12 * * 1'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: openalex-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install Python deps
        run: pip install -r scripts/requirements.txt

      - name: Run OpenAlex sync
        run: python scripts/sync_publications.py

      - name: Inspect pending file
        id: inspect
        run: |
          if [ ! -s pending_publications.yaml ]; then
            echo "have_candidates=false" >> "$GITHUB_OUTPUT"
            echo "No new candidates."
            exit 0
          fi
          echo "have_candidates=true" >> "$GITHUB_OUTPUT"
          # Extract a markdown bullet list from the pending file for the PR body
          python - << 'PY' >> "$GITHUB_OUTPUT"
          import re, sys
          text = open('pending_publications.yaml').read()
          ids = re.findall(r'(?m)^# OpenAlex (W\d+);.*$', text)
          # Split body on the # OpenAlex header lines
          parts = re.split(r'(?m)^# OpenAlex W\d+;.*$', text)[1:]
          print('candidate_count=' + str(len(ids)))
          print('pr_body<<__END__')
          print(f'OpenAlex found **{len(ids)} new candidate paper(s)** for the lab page.')
          print('')
          print('Review each block in `pending_publications.yaml`, copy the ones you want into `src/content/publications/content.yaml` (set the topic, link, etc. as you edit), commit, and merge this PR. Anything left in the pending file becomes `dropped` in `scripts/sync-state.yaml` and will not be re-suggested.')
          print('')
          for wid, body in zip(ids, parts):
              t = re.search(r"title:\s*['\"]?(.+?)['\"]?\s*$", body, re.M)
              y = re.search(r"year:\s*(\d+)", body)
              l = re.search(r"link:\s*['\"](.+?)['\"]", body)
              if t:
                  title = t.group(1).strip().rstrip("'").rstrip('"')
                  year = y.group(1) if y else '?'
                  link = l.group(1) if l else ''
                  print(f"- [{title}]({link}) — {year}")
          print('')
          print('---')
          print('_Auto-generated by [`.github/workflows/sync-publications.yml`](.github/workflows/sync-publications.yml). The diff below is the proposed `pending_publications.yaml` plus state-tracking updates._')
          print('__END__')
          PY

      - name: Stage files for PR
        if: steps.inspect.outputs.have_candidates == 'true'
        # pending_publications.yaml is gitignored for local devs; force-add it
        # so the PR shows the candidates as a reviewable diff.
        run: |
          git add -f pending_publications.yaml
          git add scripts/sync-state.yaml || true

      - name: Open or update PR
        if: steps.inspect.outputs.have_candidates == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: openalex-sync
          title: 'OpenAlex sync: ${{ steps.inspect.outputs.candidate_count }} new candidate(s)'
          body: ${{ steps.inspect.outputs.pr_body }}
          commit-message: |
            OpenAlex sync — refresh pending publications

            Auto-generated by .github/workflows/sync-publications.yml.
          delete-branch: true
          author: 'fietelab-sync-bot <noreply@github.com>'
          committer: 'fietelab-sync-bot <noreply@github.com>'
